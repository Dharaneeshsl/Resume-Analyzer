version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: resume-analyzer-backend
    environment:
      # Set your real key in an .env or compose override, not here
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-5}
      - RATE_LIMIT_REQUESTS_PER_MIN=${RATE_LIMIT_REQUESTS_PER_MIN:-30}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: resume-analyzer-frontend
    environment:
      - VITE_API_BASE=http://backend:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

